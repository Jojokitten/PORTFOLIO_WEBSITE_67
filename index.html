<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>my coding projects</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Quicksand:wght@500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --hot-pink:#ff2d89;
    --neon-pink:#ff6ec7;
    --rose:#ffb6c1;
    --blush:#fff0f5;
    --plum:#3d0c24;
    --magenta:#c2185b;
    --white:#ffffff;
  }

  *{box-sizing:border-box; margin:0; padding:0;}

  html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background: radial-gradient(circle at 20% 10%, #ffe1ec 0%, #ffd1dc 35%, #ffc1d6 60%, #ffaecb 100%);
    font-family:'Quicksand', sans-serif;
    color:var(--plum);
    cursor: default;
  }

  /* ---------- floating ambient gif-like decorations ---------- */
  .ambient{
    position:fixed;
    inset:0;
    overflow:hidden;
    z-index:0;
    pointer-events:none;
  }
  .floatie{
    position:absolute;
    font-size: clamp(18px, 3vw, 34px);
    opacity:.55;
    animation: drift linear infinite, spin linear infinite;
    filter: drop-shadow(0 0 6px rgba(255,255,255,.6));
  }
  @keyframes drift{
    0%{ transform: translateY(110vh) translateX(0); }
    100%{ transform: translateY(-15vh) translateX(40px); }
  }
  @keyframes spin{
    0%{ rotate: 0deg; }
    100%{ rotate: 360deg; }
  }

  .blob{
    position:absolute;
    border-radius:50%;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,.9), rgba(255,110,199,.25) 60%, transparent 75%);
    filter: blur(2px);
    animation: blobmove ease-in-out infinite alternate;
  }
  @keyframes blobmove{
    0%{ transform: translate(0,0) scale(1); }
    100%{ transform: translate(30px,-25px) scale(1.15); }
  }

  /* ---------- layout shell ---------- */
  .page{
    position:relative;
    z-index:1;
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    padding: clamp(10px,2vh,22px) clamp(14px,4vw,40px);
  }

  /* ---------- top bar (replaces nav) ---------- */
  .topbar{
    position:relative;
    text-align:center;
    padding: 6px 0 14px;
    flex: 0 0 auto;
  }
  .topbar h1{
    font-family:'Baloo 2', cursive;
    font-weight:800;
    font-size: clamp(28px, 5.2vw, 58px);
    letter-spacing: 1px;
    color: var(--white);
    -webkit-text-stroke: 2px var(--magenta);
    text-shadow:
      0 2px 0 var(--magenta),
      0 5px 0 var(--hot-pink),
      0 9px 18px rgba(194,24,91,.45);
    display:inline-block;
    position:relative;
    animation: wiggle 4.5s ease-in-out infinite;
  }
  @keyframes wiggle{
    0%, 100%{ transform: rotate(-1.2deg); }
    50%{ transform: rotate(1.2deg); }
  }
  .topbar .sparkle{
    position:absolute;
    font-size: clamp(16px, 2.4vw, 26px);
    animation: twinkle 1.6s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%, 100%{ opacity:.3; transform: scale(.8) rotate(0deg); }
    50%{ opacity:1; transform: scale(1.25) rotate(20deg); }
  }
  .topbar .tagline{
    font-family:'Space Mono', monospace;
    font-size: clamp(10px, 1.3vw, 14px);
    color: var(--magenta);
    letter-spacing: 3px;
    text-transform:uppercase;
    margin-top:2px;
    opacity:.85;
  }

  /* ---------- project grid ---------- */
  .grid{
    flex: 1 1 auto;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: clamp(10px, 1.6vw, 20px);
    min-height:0;
    padding-bottom: 4px;
  }

  .card{
    position:relative;
    background: linear-gradient(160deg, #ffffff 0%, #fff5f9 60%, #ffe9f2 100%);
    border-radius: 22px;
    border: 3px dashed rgba(255,45,137,.35);
    padding: clamp(8px,1.2vw,14px);
    display:flex;
    flex-direction:column;
    box-shadow: 0 10px 0 -4px rgba(194,24,91,.18), 0 14px 30px rgba(255,45,137,.25);
    transition: transform .35s cubic-bezier(.34,1.56,.64,1), box-shadow .35s ease;
    overflow:hidden;
    min-height:0;
  }
  .card::after{
    /* peeling sticker corner */
    content:"";
    position:absolute;
    top:0; right:0;
    width:34px; height:34px;
    background: linear-gradient(135deg, transparent 50%, rgba(255,182,193,.9) 51%);
    border-bottom-left-radius: 10px;
    box-shadow: -2px 2px 4px rgba(194,24,91,.25);
  }
  .card:hover{
    transform: translateY(-8px) rotate(-1deg) scale(1.02);
    box-shadow: 0 16px 0 -4px rgba(194,24,91,.22), 0 26px 38px rgba(255,45,137,.35);
    z-index:2;
  }

  .thumb{
    position:relative;
    flex: 1 1 auto;
    min-height:0;
    border-radius:16px;
    overflow:hidden;
    border: 2px solid var(--white);
    box-shadow: inset 0 0 0 2px rgba(255,45,137,.15), 0 4px 10px rgba(0,0,0,.08);
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .thumb .shine{
    position:absolute;
    top:0; left:-60%;
    width:40%; height:100%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,.65), transparent);
    transform: skewX(-20deg);
    transition: left .6s ease;
  }
  .card:hover .thumb .shine{ left:120%; }

  .thumb .emoji-fallback{
    font-size: clamp(28px, 4vw, 48px);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.15));
    animation: bob 2.4s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{ transform: translateY(0); }
    50%{ transform: translateY(-6px); }
  }

  .card h3{
    font-family:'Baloo 2', cursive;
    font-size: clamp(13px, 1.5vw, 18px);
    color: var(--magenta);
    margin: clamp(4px,1vh,8px) 0 2px;
    line-height:1.1;
  }
  .card p{
    font-size: clamp(9.5px, 1vw, 12px);
    color:#7a3a55;
    line-height:1.25;
    flex: 0 0 auto;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }

  .tags{
    display:flex;
    flex-wrap:wrap;
    gap:4px;
    margin: 4px 0 6px;
  }
  .tag{
    font-family:'Space Mono', monospace;
    font-size: clamp(7.5px, .8vw, 9.5px);
    background: var(--rose);
    color: var(--plum);
    padding: 2px 7px;
    border-radius: 20px;
    white-space:nowrap;
  }

  .visit-btn{
    margin-top:auto;
    align-self:stretch;
    text-align:center;
    text-decoration:none;
    font-family:'Baloo 2', cursive;
    font-weight:700;
    font-size: clamp(11px, 1.2vw, 14px);
    color: var(--white);
    background: linear-gradient(90deg, var(--hot-pink), var(--neon-pink));
    border-radius: 30px;
    padding: clamp(6px,1vh,9px) 10px;
    box-shadow: 0 4px 0 var(--magenta), 0 8px 16px rgba(255,45,137,.4);
    transition: transform .2s ease, box-shadow .2s ease, background-position .4s ease;
    background-size:200% 100%;
    background-position:0% 0%;
    position:relative;
    overflow:hidden;
  }
  .visit-btn:hover{
    transform: translateY(2px) scale(1.03);
    box-shadow: 0 2px 0 var(--magenta), 0 6px 12px rgba(255,45,137,.5);
    background-position:100% 0%;
  }
  .visit-btn:active{
    transform: translateY(4px) scale(.99);
    box-shadow: 0 0 0 var(--magenta);
  }
  .visit-btn .arrow{
    display:inline-block;
    transition: transform .25s ease;
  }
  .visit-btn:hover .arrow{ transform: translate(3px,-3px); }

  /* sparkle cursor trail */
  .trail-spark{
    position:fixed;
    pointer-events:none;
    z-index:50;
    font-size:14px;
    animation: sparkfade .7s ease-out forwards;
  }
  @keyframes sparkfade{
    0%{ opacity:1; transform: scale(1) translateY(0); }
    100%{ opacity:0; transform: scale(.3) translateY(-18px); }
  }

  /* ---------- responsive ---------- */
  @media (max-width: 900px){
    html,body{ overflow-y:auto; }
    .page{ height:auto; min-height:100%; }
    .grid{
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, minmax(190px,auto));
    }
  }
  @media (max-width: 560px){
    .grid{
      grid-template-columns: 1fr;
      grid-template-rows: repeat(6, minmax(170px,auto));
    }
    .topbar h1{ -webkit-text-stroke: 1.4px var(--magenta); }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<div class="ambient" id="ambient"></div>

<div class="page">

  <div class="topbar">
    <span class="sparkle" style="left:8%; top:6px;">✨</span>
    <span class="sparkle" style="right:9%; top:2px; animation-delay:.4s;">💗</span>
    <span class="sparkle" style="left:50%; top:-6px; animation-delay:.8s;">⭐</span>
    <h1>my coding projects</h1>
    <div class="tagline">click "visit" to open the live project ✦ hover the cards</div>
  </div>

  <div class="grid" id="grid">
    <!-- Cards are generated from the PROJECTS array below.
         Replace image, url, title, desc and tags with your own projects. -->
  </div>

</div>

<script>
  // ---------------------------------------------------------------
  // 1) YOUR PROJECTS — edit this array to swap in real projects.
  //    image: leave empty "" to show the cute emoji placeholder,
  //    or put an image URL / path to show a real screenshot.
  // ---------------------------------------------------------------
  const PROJECTS = [
    {
      title: "Geschirrspühler-Liste",
      desc: "Stricherlliste für Geschirrspühler, Playlist, Genshin-Pull-System und vieles mehr!",
      tags: ["JavaScript", "Mock-API", "Login"],
      image: "fotos/img_Website_Preview_GESCHIRRSPÜHLER.png",
      emoji: "🕹️",
      url: "#"
    },
    {
      title: "Vatertags Website",
      desc: "für Papa <3",
      tags: [],
      image: "fotos/img_Website_Preview_Vatertag.png",
      emoji: "🌸",
      url: "https://jojokitten.github.io/Vatertag_Website_for_Portfolio2/"
    },
    {
      title: "Catfeeder",
      desc: "Help Minni getting fat!",
      tags: ["sends_email", "spoils_cats"],
      image: "fotos/img_Website_Preview_Catfeeder.png",
      emoji: "💬",
      url: "https://jojokitten.github.io/Catfeeder/"
    },
    {
      title: "Sumpfloch Characters",
      desc: "featuring Hanns the goat",
      tags: ["Party-mode", "Chat"],
      image: "fotos/img_Website_Preview_SUMPFLOCH-CHARACTERS.png",
      emoji: "🌦️",
      url: "https://jojokitten.github.io/code-Hanns-page/"
    },
    {
      title: "CodeCanvas",
      desc: "Mini-Zeichen-App im Browser mit Ebenen, Farbverläufen und Export als PNG.",
      tags: ["TypeScript", "SVG"],
      image: "",
      emoji: "🎨",
      url: "#"
    },
    {
      title: "Very first coding try",
      desc: "",
      tags: ["html", "css"],
      image: "fotos/img_Website_Preview_Jojos-Web.png",
      emoji: "🛍️",
      url: "https://jojokitten.github.io/first_Website_for_Portfolio1/"
    }
  ];

  const grid = document.getElementById('grid');
  PROJECTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'card';

    const thumbStyle = p.image ? `style="background-image:url('${p.image}')"` : '';
    const thumbInner = p.image ? `<div class="shine"></div>` :
      `<span class="emoji-fallback">${p.emoji}</span><div class="shine"></div>`;

    card.innerHTML = `
      <div class="thumb" ${thumbStyle}>${thumbInner}</div>
      <h3>${p.title}</h3>
      <p>${p.desc}</p>
      <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <a class="visit-btn" href="${p.url}" target="_blank" rel="noopener">visit <span class="arrow">↗</span></a>
    `;
    grid.appendChild(card);
  });

  // ---------------------------------------------------------------
  // 2) Ambient floating hearts / stars (gif-like looping decoration)
  // ---------------------------------------------------------------
  const ambient = document.getElementById('ambient');
  const glyphs = ["💗","✨","⭐","💕","🌸","💖"];
  const COUNT = 18;
  for (let i = 0; i < COUNT; i++) {
    const el = document.createElement('div');
    el.className = 'floatie';
    el.textContent = glyphs[Math.floor(Math.random() * glyphs.length)];
    const left = Math.random() * 100;
    const dur = 9 + Math.random() * 10;
    const delay = -Math.random() * dur;
    const spinDur = 3 + Math.random() * 5;
    el.style.left = left + 'vw';
    el.style.animationDuration = `${dur}s, ${spinDur}s`;
    el.style.animationDelay = `${delay}s, ${delay}s`;
    ambient.appendChild(el);
  }
  // soft glowing blobs
  for (let i = 0; i < 4; i++) {
    const b = document.createElement('div');
    b.className = 'blob';
    const size = 120 + Math.random() * 160;
    b.style.width = size + 'px';
    b.style.height = size + 'px';
    b.style.left = Math.random() * 90 + 'vw';
    b.style.top = Math.random() * 90 + 'vh';
    b.style.animationDuration = (6 + Math.random() * 6) + 's';
    ambient.appendChild(b);
  }

  // ---------------------------------------------------------------
  // 3) Interactive sparkle cursor trail
  // ---------------------------------------------------------------
  const sparkGlyphs = ["✨","💗","⭐"];
  let lastSpark = 0;
  window.addEventListener('mousemove', (e) => {
    const now = Date.now();
    if (now - lastSpark < 45) return;
    lastSpark = now;
    const s = document.createElement('div');
    s.className = 'trail-spark';
    s.textContent = sparkGlyphs[Math.floor(Math.random() * sparkGlyphs.length)];
    s.style.left = (e.clientX - 6) + 'px';
    s.style.top = (e.clientY - 6) + 'px';
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 700);
  });
</script>

</body>
</html>
